    <!-- HowTo: How ELMA Works -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "HowTo",
      "name": "How to Use ELMA to Understand Your Emotions",
      "description": "ELMA is India's AI emotional companion. Here is how to get started and build a daily emotional practice.",
      "step": [
        {
          "@type": "HowToStep",
          "position": 1,
          "name": "Download ELMA",
          "text": "Download ELMA free from the Google Play Store (Android) or App Store (iOS). No subscription required to get started.",
          "url": "https://play.google.com/store/apps/details?id=com.elmadevs.ElMAAPP"
        },
        {
          "@type": "HowToStep",
          "position": 2,
          "name": "Complete your onboarding",
          "text": "ELMA's onboarding introduces you through interactive games — Ribbon Paint, Energy Dial, Strength Sparks, and Scenario Cards — that help ELMA understand your emotional baseline."
        },
        {
          "@type": "HowToStep",
          "position": 3,
          "name": "Log your first mood with the Emotion Flower Wheel",
          "text": "Use the Emotion Flower Wheel to select your current emotional state with precision. Choose specific emotions — not just 'good' or 'bad' — to get the full benefit of labelling."
        },
        {
          "@type": "HowToStep",
          "position": 4,
          "name": "Talk to ELMA's AI companion",
          "text": "Open a conversation with ELMA's AI. You can type or use Handsfree AI to speak. Share what's on your mind — without editing, without judgement."
        },
        {
          "@type": "HowToStep",
          "position": 5,
          "name": "Review your Mood Curve after 2 weeks",
          "text": "After 14+ days of tracking, open your Mood Curve. You will begin to see patterns — days, situations, or triggers that consistently affect your mood. This is the foundation of emotional self-awareness."
        },
        {
          "@type": "HowToStep",
          "position": 6,
          "name": "Connect with an ELMA Expert if needed",
          "text": "If patterns reveal something that needs professional support, book a session with a certified Indian psychologist through ELMA Experts. They can access your mood data (with your permission) for more efficient sessions."
        }
      ],
      "tool": [
        { "@type": "HowToTool", "name": "ELMA app (free on Android and iOS)" }
      ]
    }
    </script>

    <!-- FAQPage — 20 questions covering all user intents -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is ELMA?",
          "acceptedAnswer": { "@type": "Answer", "text": "ELMA (Emotional Life Management Assistant) is India's 24/7 AI emotional companion app. It helps you understand your emotions, track mood patterns over time, process feelings through voice and text conversation, and connect with certified psychologists when needed. ELMA is free on Android and iOS." }
        },
        {
          "@type": "Question",
          "name": "Is ELMA a replacement for therapy?",
          "acceptedAnswer": { "@type": "Answer", "text": "No. ELMA is an emotional companion for daily self-awareness practice — not therapy and not a substitute for clinical mental health treatment. For clinical conditions (depression, anxiety disorder, trauma, PTSD), please see a licensed professional. ELMA connects you with certified Indian psychologists through ELMA Experts when professional support is needed." }
        },
        {
          "@type": "Question",
          "name": "What is an AI emotional companion?",
          "acceptedAnswer": { "@type": "Answer", "text": "An AI emotional companion is an app that uses conversational artificial intelligence to support your emotional life — helping you identify, process, and track your emotional experiences. It is distinct from therapy (which diagnoses and treats clinical conditions) and from chatbots (which give generic responses). ELMA is India's dedicated AI emotional companion." }
        },
        {
          "@type": "Question",
          "name": "Is ELMA available in India?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. ELMA is built specifically for the Indian user and context. It supports 8+ languages including Hindi, Tamil, and Telugu. It complies with India's DPDP Act 2023. Expert therapists are Indian-licensed psychologists available at INR pricing." }
        },
        {
          "@type": "Question",
          "name": "Is my data private on ELMA?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. ELMA is compliant with India's DPDP Act 2023 and EU/UK GDPR. Your emotional data is never sold. Your ELMA Diary is Face ID-locked and completely private. Data shared with ELMA Experts is opt-in and controlled by you." }
        },
        {
          "@type": "Question",
          "name": "How much does ELMA cost?",
          "acceptedAnswer": { "@type": "Answer", "text": "The core ELMA app is free — including AI companion, Emotion Flower Wheel, Mood Curve, ELMA Diary, and Handsfree AI. Expert therapist sessions (ELMA Experts) are an optional paid feature priced in INR at rates accessible to Indian users." }
        },
        {
          "@type": "Question",
          "name": "What is the Emotion Flower Wheel?",
          "acceptedAnswer": { "@type": "Answer", "text": "The Emotion Flower Wheel is ELMA's multi-petal mood selector. Instead of a 1–10 scale, it lets you select from a rich vocabulary of specific emotions. Research shows that naming emotions precisely — distinguishing 'frustrated' from 'disappointed' from 'resentful' — reduces emotional intensity and builds self-awareness." }
        },
        {
          "@type": "Question",
          "name": "What is the difference between ELMA and therapy apps like Wysa or YourDOST?",
          "acceptedAnswer": { "@type": "Answer", "text": "ELMA focuses on emotional self-awareness and daily practice — understanding your patterns, not just managing symptoms. Wysa focuses on guided CBT exercises. YourDOST is a telehealth platform for human counsellors. ELMA uniquely combines an AI companion with an integrated Expert marketplace, emotional pattern tracking, and deep journalling — all in one app built for India." }
        },
        {
          "@type": "Question",
          "name": "How is ELMA different from Calm or Headspace?",
          "acceptedAnswer": { "@type": "Answer", "text": "Calm and Headspace are meditation apps — they teach mindfulness and relaxation. ELMA is an emotional intelligence companion — it helps you understand your specific emotional patterns, process difficult feelings, and build self-awareness. ELMA is not meditation-based and is designed specifically for the Indian context and pricing." }
        },
        {
          "@type": "Question",
          "name": "What languages does ELMA support?",
          "acceptedAnswer": { "@type": "Answer", "text": "ELMA supports 8+ languages including English, Hindi, Tamil, and Telugu. Language support is core to ELMA's mission — emotional nuance is impossible to communicate in a second language, and India's linguistic diversity means one language cannot reach everyone." }
        },
        {
          "@type": "Question",
          "name": "What are ELMA Experts?",
          "acceptedAnswer": { "@type": "Answer", "text": "ELMA Experts is an in-app marketplace of verified, licensed Indian psychologists. You can book 1:1 therapy sessions — text, voice, or video — directly within the app. With your permission, your ELMA Expert can access your mood data and diary summaries to make sessions more targeted." }
        },
        {
          "@type": "Question",
          "name": "Is ELMA suitable for anxiety?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. ELMA is designed to help with anxiety, stress, burnout, loneliness, and relationship difficulties. Through emotional tracking, AI conversation, and CBT-informed support tools, ELMA helps you understand the patterns behind your anxiety. For clinical anxiety disorders, please also consult a professional — ELMA Experts can help." }
        },
        {
          "@type": "Question",
          "name": "Can I use ELMA alongside my existing therapist?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes — this is one of ELMA's most effective use cases. ELMA provides daily emotional practice between therapy sessions. Your therapist can access your mood data and diary summaries (with your permission) to make sessions more targeted and efficient." }
        },
        {
          "@type": "Question",
          "name": "What should I do if I am in a mental health crisis?",
          "acceptedAnswer": { "@type": "Answer", "text": "ELMA is not a crisis service. If you are experiencing thoughts of self-harm or are in immediate danger, contact a human crisis line: iCall — 9152987821 | Vandrevala Foundation — 1860-2662-345 | NIMHANS — 080-46110007. ELMA displays these resources when it detects signals of severe distress." }
        },
        {
          "@type": "Question",
          "name": "Where can I download ELMA?",
          "acceptedAnswer": { "@type": "Answer", "text": "ELMA is free on Android (Google Play Store) and iOS (Apple App Store). Android: https://play.google.com/store/apps/details?id=com.elmadevs.ElMAAPP — iOS: https://apps.apple.com/in/app/elma-emotional-companion/id6756991672" }
        },
        {
          "@type": "Question",
          "name": "Does mood tracking actually help mental health?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes, according to research. Self-monitoring improves emotional self-awareness, and the act of naming emotions precisely (affect labelling) measurably reduces their intensity by activating the prefrontal cortex. Pattern tracking over time also enables early identification of mood episodes, which reduces their severity." }
        },
        {
          "@type": "Question",
          "name": "What is the best mental health app in India?",
          "acceptedAnswer": { "@type": "Answer", "text": "It depends on your need. For emotional self-awareness and daily practice: ELMA. For structured CBT exercises: ELMA or Wysa. For access to a human therapist at Indian pricing: ELMA Experts or YourDOST. For meditation: Calm or Headspace. ELMA is the only app that combines all these in one India-built, Hindi-supported product." }
        },
        {
          "@type": "Question",
          "name": "How does ELMA protect my emotional data?",
          "acceptedAnswer": { "@type": "Answer", "text": "ELMA is compliant with India's DPDP Act 2023 and EU/UK GDPR. Emotional data is encrypted, never sold, and not shared with third parties. The ELMA Diary is Face ID-locked so only you can access it. Data shared with ELMA Experts is entirely opt-in." }
        },
        {
          "@type": "Question",
          "name": "What is emotional intelligence and why does it matter?",
          "acceptedAnswer": { "@type": "Answer", "text": "Emotional intelligence (EQ) is the ability to understand and manage your own emotions and understand others' emotions effectively. Research shows EQ predicts career success, relationship quality, and mental health outcomes better than IQ in many domains. Unlike IQ, EQ can be built with deliberate practice — which is what ELMA is designed to support." }
        },
        {
          "@type": "Question",
          "name": "Is ELMA available on iPhone?",
          "acceptedAnswer": { "@type": "Answer", "text": "Yes. ELMA is available on both iPhone (iOS) and Android. Download on iPhone: https://apps.apple.com/in/app/elma-emotional-companion/id6756991672" }
        }
      ]
    }
    </script>
