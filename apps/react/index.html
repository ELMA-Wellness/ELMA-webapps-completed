        {
          "@type": "Question",
          "name": "What is ELMA?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ELMA is an AI-powered emotional companion available 24/7. It helps you understand your emotions, manage anxiety and stress, and connect with certified therapists when needed."
          }
        },
        {
          "@type": "Question",
          "name": "Is ELMA a replacement for therapy?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. ELMA is a companion that supports your emotional wellbeing daily. It can connect you with certified therapists when professional support is needed."
          }
        },
        {
          "@type": "Question",
          "name": "Is ELMA available in India?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. ELMA is built specifically for the Indian context, supports 8+ Indian languages, and is compliant with India's DPDP 2023 data protection law."
          }
        },
        {
          "@type": "Question",
          "name": "Is my data private on ELMA?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. ELMA is GDPR and DPDP 2023 compliant. Your emotional data is never sold or shared. Full details in our privacy policy."
          }
        },
        {
          "@type": "Question",
          "name": "How much does ELMA cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "ELMA is free to download and use. Premium features and therapist sessions are available at affordable pricing designed for Indian users."
          }
        }
      ]
    }
