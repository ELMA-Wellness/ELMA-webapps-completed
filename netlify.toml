# ELMA — netlify.toml
# Build, redirect, header, and prerender configuration

[build]
  command = "npm ci && npm run build --workspace=apps/react"
  publish = "apps/react/dist"

# ── Geo-based language redirects (root only, evaluated top-to-bottom) ─────────
# force = true is required because index.html exists at / in the build output;
# without it Netlify serves the static file and skips the redirect entirely.
[[redirects]]
  from       = "/"
  to         = "/ja"
  status     = 302
  force      = true
  conditions = {Country = ["JP"]}

[[redirects]]
  from       = "/"
  to         = "/fr"
  status     = 302
  force      = true
  conditions = {Country = ["FR", "BE", "LU", "CH"]}

[[redirects]]
  from       = "/"
  to         = "/es"
  status     = 302
  force      = true
  conditions = {Country = ["ES", "MX", "AR", "CO", "CL", "PE", "VE", "EC", "BO", "PY", "UY"]}

[[redirects]]
  from       = "/"
  to         = "/hi"
  status     = 302
  force      = true
  conditions = {Country = ["IN"]}

[[redirects]]
  from   = "/"
  to     = "/en"
  status = 302
  force  = true

# ── SPA fallback (React Router) ───────────────────────────────────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Security & SEO headers (all pages) ───────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options            = "SAMEORIGIN"
    X-Content-Type-Options     = "nosniff"
    X-XSS-Protection           = "1; mode=block"
    Referrer-Policy            = "strict-origin-when-cross-origin"
    Permissions-Policy         = "camera=(), microphone=(), geolocation=()"
    Strict-Transport-Security  = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy    = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://fonts.googleapis.com https://api.web3forms.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https:; connect-src 'self' https://api.web3forms.com https://*.firebaseio.com https://*.googleapis.com https://firestore.googleapis.com; frame-ancestors 'none';"

# ── Static file caching ───────────────────────────────────────────────────────
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control  = "public, max-age=86400"
    Content-Type   = "application/xml; charset=utf-8"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type  = "text/plain; charset=utf-8"
